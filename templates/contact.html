<section class="contact" id="contact">
    <!-- EmailJS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>emailjs.init("IECIK2HGSkNoQSmeG");</script>  

    <style>
        .contact {
            position: relative;
            padding: 7rem 2rem;
            background:
                radial-gradient(circle at 18% 20%, rgba(139, 92, 246, 0.14), transparent 28%),
                radial-gradient(circle at 82% 80%, rgba(177, 92, 255, 0.12), transparent 32%),
                linear-gradient(135deg, #ffffff 0%, #f5f0ff 48%, #fbfaff 100%);
            color: #14111f;
            overflow: hidden;
        }

        .contact::before {
            content: "";
            position: absolute;
            width: 420px;
            height: 420px;
            left: -160px;
            top: 80px;
            border-radius: 50%;
            background: rgba(139, 92, 246, 0.14);
            filter: blur(70px);
        }

        .contact::after {
            content: "";
            position: absolute;
            width: 360px;
            height: 360px;
            right: -140px;
            bottom: 60px;
            border-radius: 50%;
            background: rgba(177, 92, 255, 0.12);
            filter: blur(70px);
        }

        .contact-content {
            position: relative;
            z-index: 2;
            max-width: 1160px;
            margin: 0 auto;
        }

        .contact-title {
            font-size: clamp(2.4rem, 5vw, 4rem);
            font-weight: 800;
            color: #14111f;
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .contact-title::after {
            content: "";
            display: block;
            width: 86px;
            height: 5px;
            border-radius: 999px;
            background: linear-gradient(135deg, #7b35ff, #b15cff);
            margin: 16px auto 0;
        }

        .contact-layout {
            display: grid;
            grid-template-columns: 0.95fr 1.05fr;
            gap: 34px;
            align-items: start;
        }

        .contact-info {
            display: grid;
            gap: 22px;
        }

        .contact-info-card {
            display: flex;
            align-items: center;
            gap: 20px;
            min-height: 112px;
            padding: 26px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(139, 92, 246, 0.14);
            box-shadow: 0 24px 70px rgba(68, 40, 120, 0.12);
            transition: 0.35s ease;
        }

        .contact-info-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 28px 80px rgba(68, 40, 120, 0.18);
        }

        .contact-info-icon {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #2563eb;
            background: #dbeafe;
            font-size: 1.65rem;
            flex: 0 0 auto;
        }

        .contact-info-card h3 {
            color: #14111f;
            font-size: 1.25rem;
            margin-bottom: 8px;
        }

        .contact-info-card a,
        .contact-info-card p {
            color: #2f3650;
            font-size: 1rem;
            line-height: 1.6;
            text-decoration: none;
            overflow-wrap: anywhere;
        }

        .contact-info-card a:hover {
            color: #7c3aed;
        }

        .contact-form {
            padding: 42px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.86);
            border: 1px solid rgba(139, 92, 246, 0.16);
            box-shadow: 0 24px 70px rgba(68, 40, 120, 0.12);
        }

        .form-group {
            margin-bottom: 1.4rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.55rem;
            color: #312a40;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.95rem 1rem;
            border: 1px solid rgba(139, 92, 246, 0.18);
            border-radius: 14px;
            font-size: 1rem;
            color: #14111f;
            background: rgba(255, 255, 255, 0.92);
            outline: none;
            transition: 0.3s ease;
            resize: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.12);
        }

        .submit-btn {
            width: 100%;
            height: 54px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #7b35ff, #b15cff);
            box-shadow: 0 16px 34px rgba(139, 92, 246, 0.28);
            transition: 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 42px rgba(139, 92, 246, 0.38);
        }

        @media (max-width: 768px) {
            .contact {
                padding: 5.5rem 1.2rem;
            }

            .contact-form {
                padding: 28px;
            }

            .contact-layout {
                grid-template-columns: 1fr;
            }

            .contact-info-card {
                padding: 22px;
            }
        }

        @media (max-width: 420px) {
            .contact {
                padding-left: 1rem;
                padding-right: 1rem;
            }

            .contact-title {
                margin-bottom: 2rem;
            }

            .contact-info-card {
                align-items: flex-start;
                gap: 16px;
                padding: 20px 16px;
                border-radius: 22px;
            }

            .contact-info-icon {
                width: 52px;
                height: 52px;
                border-radius: 16px;
                font-size: 1.3rem;
            }

            .contact-form {
                padding: 24px 18px;
                border-radius: 22px;
            }
        }
    </style>

    <div class="contact-content">
        <h2 class="contact-title">Get In Touch</h2>

        <div class="contact-layout">
            <div class="contact-info">
                <div class="contact-info-card">
                    <span class="contact-info-icon">
                        <i class="fa-solid fa-phone"></i>
                    </span>
                    <div>
                        <h3>Call Me</h3>
                        <a href="tel:+918830691277">+91 8830691277</a>
                    </div>
                </div>

                <div class="contact-info-card">
                    <span class="contact-info-icon">
                        <i class="fa-regular fa-envelope"></i>
                    </span>
                    <div>
                        <h3>Email Me</h3>
                        <a href="mailto:gauravpatil0902@gmail.com">gauravpatilraj143@gmail.com</a>
                    </div>
                </div>

                <div class="contact-info-card">
                    <span class="contact-info-icon">
                        <i class="fa-solid fa-location-dot"></i>
                    </span>
                    <div>
                        <h3>Location</h3>
                        <p>Pune, Maharashtra, India</p>
                    </div>
                </div>
            </div>

            <form class="contact-form" id="contactForm">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        pattern="^[A-Za-z]+ [A-Za-z]+$"
                        title="Enter first and last name, for example Gaurav Patil"
                        placeholder="Enter first and last name"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        pattern=".+@gmail\.com$"
                        title="Email must end with @gmail.com"
                        placeholder="example@gmail.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea
                        rows="5"
                        id="message"
                        name="message"
                        maxlength="300"
                        placeholder="Write your message here..."
                        required
                    ></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">Send Message</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            btn.textContent = 'Sending...';
            btn.disabled = true;

            const templateParams = {
                from_name:  document.getElementById('name').value,
                from_email: document.getElementById('email').value,
                message:    document.getElementById('message').value,
                to_name:    'Gaurav',
            };

            emailjs.send('service_bwio72h', 'template_r9anxfw', templateParams)  
                .then(() => {
                    btn.textContent = '✅ Message Sent!';
                    btn.style.background = 'linear-gradient(135deg, #16a34a, #22c55e)';
                    document.getElementById('contactForm').reset();
                    setTimeout(() => {
                        btn.textContent = 'Send Message';
                        btn.style.background = '';
                        btn.disabled = false;
                    }, 4000);
                })
                .catch((error) => {
                    console.error('EmailJS error:', error);
                    btn.textContent = '❌ Failed. Try again.';
                    btn.style.background = 'linear-gradient(135deg, #dc2626, #ef4444)';
                    setTimeout(() => {
                        btn.textContent = 'Send Message';
                        btn.style.background = '';
                        btn.disabled = false;
                    }, 4000);
                });
        });
    </script>

</section>
